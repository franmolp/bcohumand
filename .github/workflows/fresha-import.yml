name: Importar datos Fresha

on:
  schedule:
    # Lunes a sábado a las 07:00 ART (10:00 UTC — Argentina no usa horario de verano)
    - cron: '0 10 * * 1-6'
  workflow_dispatch:
    # También se puede correr manualmente desde GitHub Actions

jobs:
  import:
    name: Descargar e importar reportes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chromium para Playwright
        run: npx playwright install chromium --with-deps

      - name: Importar datos de Fresha
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FRESHA_SESSION: ${{ secrets.FRESHA_SESSION }}
        run: node scripts/fresha-scraper.mjs

      - name: Subir screenshots de debug si el job falló
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fresha-debug-screenshots
          path: /tmp/fresha-*-debug.png
          if-no-files-found: ignore
          retention-days: 3
