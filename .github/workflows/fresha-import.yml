name: Importar datos Fresha

on:
  schedule:
    # Todos los días a las 06:15 UTC = 03:15 ART — 15 min después de Loyverse
    - cron: '15 6 * * *'
  workflow_dispatch:
    inputs:
      from:
        description: 'Fecha inicio (YYYY-MM-DD). Vacío = 1° del mes actual'
        required: false
      to:
        description: 'Fecha fin (YYYY-MM-DD). Vacío = fin del mes siguiente'
        required: false

jobs:
  import:
    name: Descargar e importar reportes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chromium para Playwright
        run: npx playwright install chromium --with-deps

      - name: Importar datos de Fresha
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FRESHA_SESSION: ${{ secrets.FRESHA_SESSION }}
          FROM: ${{ inputs.from }}
          TO: ${{ inputs.to }}
        run: node scripts/fresha-scraper.mjs

      - name: Subir screenshots de debug si el job falló
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fresha-debug-screenshots
          path: /tmp/fresha-*-debug.png
          if-no-files-found: ignore
          retention-days: 3
